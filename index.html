<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="icon" type="image/svg+xml" href="/vite.svg">
<title>Nestor — CF3D CAN Data Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #1e1e1e;
    color: #fff;
    font-family: "Ubuntu Mono", "Consolas", "Monaco", monospace;
    font-size: 12px;
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 1200px) {
    body { zoom: 0.8; }
  }

  #top-bar {
    height: 42px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
  }
  #top-bar h1 {
    font-size: 14px;
    font-weight: bold;
    color: #f1c40f;
  }
  #top-bar select {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  #top-bar select:hover { border-color: #777; }
  #top-bar .status {
    margin-left: auto;
    color: #888;
    font-size: 11px;
  }
  #top-bar .status.connected { color: #27ae60; }
  #top-bar .status.error { color: #e74c3c; }

  #main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #side-panel {
    width: 280px;
    background: #222;
    border-right: 1px solid #444;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .panel-section {
    border-bottom: 1px solid #444;
    padding: 8px;
  }
  .panel-section h3 {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .device-list, .boot-list {
    list-style: none;
    max-height: 180px;
    overflow-y: auto;
  }
  .device-list li, .boot-list li {
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .device-list li:hover, .boot-list li:hover { background: #333; }
  .device-list li.selected, .boot-list li.selected { background: #3498db; }
  .device-list .device-name, .boot-list .boot-id {
    font-weight: bold;
    font-size: 11px;
  }
  .device-list .device-meta, .boot-list .boot-meta {
    font-size: 9px;
    color: #888;
  }
  .device-list li.selected .device-meta,
  .boot-list li.selected .boot-meta { color: #ccc; }

  #canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    touch-action: none;
    background: #000;
  }
  #main-canvas { display: block; }
  #canvas-tooltip {
    position: absolute;
    display: none;
    pointer-events: none;
    background: #333;
    border: 1px solid #555;
    padding: 6px 10px;
    font-size: 11px;
    color: #fff;
    border-radius: 4px;
    z-index: 10;
    white-space: pre;
    max-width: 400px;
  }

  #timeline-container {
    height: 160px;
    background: #1a1a1a;
    border-top: 1px solid #444;
    position: relative;
    flex-shrink: 0;
  }
  #timeline-resize {
    height: 5px;
    cursor: ns-resize;
    background: transparent;
  }
  #timeline-resize:hover { background: rgba(255,255,255,0.1); }
  #timeline-canvas { display: block; width: 100%; height: calc(100% - 5px); touch-action: none; }
  #timeline-tooltip {
    position: absolute;
    display: none;
    pointer-events: none;
    background: #333;
    border: 1px solid #555;
    padding: 4px 8px;
    font-size: 11px;
    color: #fff;
    border-radius: 3px;
    z-index: 10;
    white-space: pre;
  }

  #records-container {
    height: 200px;
    background: #1e1e1e;
    border-top: 1px solid #444;
    overflow: auto;
    flex-shrink: 0;
  }
  #records-resize {
    height: 5px;
    cursor: ns-resize;
    background: transparent;
  }
  #records-resize:hover { background: rgba(255,255,255,0.1); }
  #records-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  #records-table th {
    background: #2a2a2a;
    position: sticky;
    top: 0;
    padding: 6px 8px;
    text-align: left;
    font-weight: bold;
    border-bottom: 1px solid #444;
    z-index: 1;
  }
  #records-table td {
    padding: 4px 8px;
    border-bottom: 1px solid #333;
    white-space: nowrap;
  }
  #records-table tr:hover td { background: #2a2a2a; }
  .mono { font-family: "Ubuntu Mono", "Consolas", monospace; }
  .can-id { color: #f1c40f; }
  .can-data { color: #3498db; }
  .timestamp { color: #888; }

  #status-bar {
    height: 24px;
    line-height: 24px;
    background: #2a2a2a;
    border-top: 1px solid #444;
    padding: 0 12px;
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
  }

  .empty-state {
    color: #555;
    font-style: italic;
    padding: 16px;
    text-align: center;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #1a1a1a; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>
  <div id="top-bar">
    <h1>🔌 Nestor</h1>
    <select id="device-select">
      <option value="">Select device...</option>
    </select>
    <select id="boot-select" disabled>
      <option value="">Select boot...</option>
    </select>
    <span id="connection-status" class="status">Connecting...</span>
  </div>

  <div id="main-area">
    <div id="side-panel">
      <div class="panel-section">
        <h3>Devices</h3>
        <ul id="device-list" class="device-list"></ul>
      </div>
      <div class="panel-section" style="flex:1; overflow:hidden;">
        <h3>Boot Sessions</h3>
        <ul id="boot-list" class="boot-list"></ul>
      </div>
    </div>

    <div id="canvas-area">
      <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
        <div id="canvas-tooltip"></div>
      </div>

      <div id="timeline-container">
        <div id="timeline-resize"></div>
        <canvas id="timeline-canvas"></canvas>
        <div id="timeline-tooltip"></div>
      </div>

      <div id="records-container">
        <div id="records-resize"></div>
        <table id="records-table">
          <thead>
            <tr>
              <th>Time (µs)</th>
              <th>Seq#</th>
              <th>CAN ID</th>
              <th>Ext</th>
              <th>RTR</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-left">Ready</span>
    <span id="status-right"></span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
